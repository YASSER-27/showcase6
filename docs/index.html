<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showcase Demo | Professional Builder</title>
    <meta name="description" content="A professional 16:9 image showcase builder for GitHub projects. inspired by pa.py.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div id="app">
        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Header -->
        <header>
            <div class="logo">
                <img src="icon.ico" alt="Logo" class="header-icon">
                <h1>Showcase<span>Demo</span></h1>
            </div>
            <div class="actions">
                <button id="resetBtn" class="btn-secondary">Reset</button>
                <a href="https://github.com/YASSER-27/showcase6" target="_blank" class="btn-secondary">Full Version</a>
                <button id="exportBtn" class="btn-primary">Export Image</button>
            </div>
        </header>

        <main>
            <!-- Upload Section -->
            <section id="uploadSection" class="view active">
                <div class="upload-container">
                    <div class="upload-card" id="dropZone">
                        <div class="upload-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </div>
                        <h2>Drop your images here</h2>
                        <p>Support up to 4 images (PNG, JPG, WebP)</p>
                        <input type="file" id="fileInput" multiple accept="image/*" hidden>
                        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Select Files</button>
                        
                        <div class="preview-grid" id="previewGrid"></div>
                    </div>
                </div>
            </section>

            <!-- Editor Section -->
            <section id="editorSection" class="view">
                <div class="editor-layout">
                    <!-- Left Toolbar -->
                    <aside class="sidebar left-sidebar">
                        <div class="tool-group">
                            <h3>Add Elements</h3>
                            <button id="addTextBtn" class="tool-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
                                Add Text
                            </button>
                            <button id="addImageBtn" class="tool-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                Add Image
                            </button>
                        </div>

                        <div class="tool-group">
                            <h3>Canvas Settings</h3>
                            <div class="prop-group">
                                <label>Background Color</label>
                                <input type="color" id="canvasBg" value="#ffffff">
                            </div>
                        </div>

                        <div class="tool-group">
                            <h3>Badge Presets</h3>
                            <div class="badge-presets">
                                <button class="badge-preset" data-text="PRO" data-bg="#7c5cfc" data-fg="#fff">PRO</button>
                                <button class="badge-preset" data-text="NEW" data-bg="#22c55e" data-fg="#fff">NEW</button>
                                <button class="badge-preset" data-text="STABLE" data-bg="#3b82f6" data-fg="#fff">STABLE</button>
                                <button class="badge-preset" data-text="BETA" data-bg="#f59e0b" data-fg="#fff">BETA</button>
                                <button class="badge-preset" data-type="rect" data-text="RECT" data-bg="#ef4444" data-fg="#fff">Rect</button>
                                <button class="badge-preset" data-type="square" data-text="SQ" data-bg="#10b981" data-fg="#fff">Square</button>
                                <button class="badge-preset" data-type="split" data-text="build|passing" data-bg="#7c5cfc" data-fg="#fff">Split</button>
                            </div>
                        </div>
                    </aside>

                    <!-- Workspace -->
                    <div class="workspace-container">
                        <div class="canvas-wrapper">
                            <div id="canvas" class="canvas-16-9">
                                <!-- Elements will be injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Right Sidebar (Properties) -->
                    <aside class="sidebar right-sidebar" id="propertiesPanel">
                        <div class="no-selection-msg">
                            <p>Select an element to edit</p>
                        </div>
                        
                        <div class="props-content hidden" id="propsContent">
                            <h3 id="propTitle">Edit Element</h3>
                            
                            <div class="prop-group" id="textProps">
                                <label>Text Content</label>
                                <textarea id="textInput" rows="2"></textarea>
                                
                                <div class="flex-row">
                                    <div class="input-col">
                                        <label>Size</label>
                                        <input type="number" id="textSize" value="40">
                                    </div>
                                    <div class="input-col">
                                        <label>Color</label>
                                        <input type="color" id="textColor" value="#ffffff">
                                    </div>
                                </div>
                                <div class="flex-row hidden" id="badgeColors">
                                    <div class="input-col">
                                        <label>Badge Bg</label>
                                        <input type="color" id="badgeBg" value="#7c5cfc">
                                    </div>
                                </div>
                            </div>

                            <div class="prop-group">
                                <label>3D Rotation</label>
                                <div class="range-row">
                                    <span>X</span>
                                    <input type="range" id="rotX" min="-45" max="45" value="0">
                                </div>
                                <div class="range-row">
                                    <span>Y</span>
                                    <input type="range" id="rotY" min="-45" max="45" value="0">
                                </div>
                                <div class="range-row">
                                    <span>Z</span>
                                    <input type="range" id="rotZ" min="-180" max="180" value="0">
                                </div>
                            </div>

                            <div class="prop-group">
                                <label>Effects</label>
                                <div class="range-row">
                                    <span>Shadow</span>
                                    <input type="range" id="shadowStr" min="0" max="100" value="20">
                                </div>
                                <div class="range-row">
                                    <span>Opacity</span>
                                    <input type="range" id="opacity" min="0" max="100" value="100">
                                </div>
                            </div>

                            <div class="prop-group">
                                <label>Position & Actions</label>
                                <div class="btn-grid">
                                    <button class="small-btn" id="copyElem">Copy</button>
                                    <button class="small-btn" id="copyStyle">Copy Style</button>
                                    <button class="small-btn" id="pasteStyle">Paste Style</button>
                                    <button class="small-btn" id="bringFront">Front</button>
                                    <button class="small-btn" id="sendBack">Back</button>
                                    <button class="small-btn danger" id="deleteElem">Delete</button>
                                </div>
                            </div>
                        </div>
                    </aside>
                </div>
            </section>
        </main>
    </div>

    <!-- Ratio Selection Modal -->
    <div id="ratioModal" class="modal hidden">
        <div class="modal-content">
            <h3>Select Export Aspect Ratio</h3>
            <div class="ratio-grid">
                <button class="ratio-btn" data-ratio="16/9">16:9 (Default)</button>
                <button class="ratio-btn" data-ratio="1/1">1:1 (Square)</button>
                <button class="ratio-btn" data-ratio="4/3">4:3 (Standard)</button>
                <button class="ratio-btn" data-ratio="3/4">3:4 (Portrait)</button>
                <button class="ratio-btn" data-ratio="21/9">21:9 (Ultrawide)</button>
                <button class="ratio-btn" data-ratio="9/16">9:16 (Story)</button>
            </div>
            <button class="btn-secondary" id="closeRatioModal">Cancel</button>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="bg-blur"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
